<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LHA - Reset Password</title>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="css/auth.css">

</head>
<body class="relative flex items-center justify-center min-h-screen p-4 text-gray-200">

    <!-- The animated background, sits behind everything -->
    <div class="animated-gradient-background"></div>

    <!-- "Back to Sign In" Link -->
    <a href="index.html" class="absolute top-6 left-6 z-50 flex items-center gap-2 text-gray-400 transition-colors duration-300 hover:text-teal-400">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Sign In</span>
    </a>

    <!-- Main container lifted above the background -->
    <div class="relative z-10 w-full max-w-md mx-auto">
        
        <!-- === Forgot Password Panel === -->
        <div id="forgot-password-panel" class="auth-panel">
            <!-- Glassmorphism container -->
            <div class="flex flex-col rounded-2xl shadow-2xl overflow-hidden border border-gray-700 bg-gray-900/50 backdrop-blur-lg h-full p-12 justify-center items-center">
                
                <!-- Header -->
                <h1 class="text-4xl font-bold text-white mb-4 text-center font-orbitron">Forgot Password?</h1>
                <p class="text-gray-400 mb-8 text-center">No worries! Enter the email address associated with your account, and we'll send you a link to reset your password.</p>
                
                <!-- Form -->
                <form action="#" class="w-full">
                    <!-- Email Input -->
                    <div class="relative mb-6 w-full">
                        <input type="email" id="email-forgot" placeholder=" " required 
                               class="block w-full px-1 py-2 text-base text-white bg-transparent border-0 border-b-2 border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-teal-500 peer" />
                        <label for="email-forgot" 
                               class="absolute text-base text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 origin-[0] 
                                      peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 
                                      peer-focus:scale-75 peer-focus:-translate-y-6
                                      peer-focus:text-teal-500 pointer-events-none">Email Address</label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="w-full mt-4 rounded-full px-8 py-3 font-semibold tracking-wider uppercase text-white transition-all duration-300 bg-gradient-to-r from-teal-500 to-cyan-500 transform shadow-[0_4px_15px_0_rgba(45,212,191,0.35)] hover:-translate-y-1 hover:shadow-[0_7px_20px_0_rgba(45,212,191,0.5)]">
                        Send Reset Link
                    </button>
                </form>

            </div>
        </div>

    </div>

</body>
</html>
