<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | LHA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-gray-300 font-sans">

    <!-- Navigation (reused component) -->
    <nav id="navbar" class="sticky top-0 w-full z-20 bg-gray-900 bg-opacity-80 backdrop-blur-md border-b border-gray-800">
        <!-- Same nav content as index.html -->
    </nav>
    
    <!-- Main Content -->
    <main class="container mx-auto px-6 py-20">
        <h1 class="text-4xl font-bold text-white text-center mb-12">Our Services</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- Service Card 1: Consulting -->
            <div class="bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-8 text-center hover:shadow-blue-500/20 transition duration-300 transform hover:-translate-y-2">
                <h3 class="text-2xl font-bold mb-4 text-white">Consulting</h3>
                <p class="text-gray-400">Strategic guidance and expert advice to drive your business forward.</p>
            </div>
            <!-- Service Card 2: Development -->
            <div class="bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-8 text-center hover:shadow-blue-500/20 transition duration-300 transform hover:-translate-y-2">
                <h3 class="text-2xl font-bold mb-4 text-white">Development</h3>
                <p class="text-gray-400">Building scalable and robust solutions tailored to your needs.</p>
            </div>
            <!-- Service Card 3: Support -->
            <div class="bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-8 text-center hover:shadow-blue-500/20 transition duration-300 transform hover:-translate-y-2">
                <h3 class="text-2xl font-bold mb-4 text-white">Support</h3>
                <p class="text-gray-400">Reliable and efficient support to ensure your systems run smoothly.</p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
